<!doctype html>
<html data-bs-theme="dark" lang="es">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Inicio con Boostrap</title>
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" rel="stylesheet">
</head>
<body>
<h1 class="text-center py-4 text-warning">Hola Mundo</h1>

<div class="container">
    <table class="table">
        <thead>
        <tr>
            <th scope="col">Id</th>
            <th scope="col">Nombre</th>
            <th scope="col">Apellido</th>
            <th scope="col">Membresía</th>

        </thead>
        <tbody>
        <tr>
            <th scope="row">1</th>
            <td>Renata</td>
            <td>Cruz</td>
            <td>100</td>
        </tr>
        <tr>
            <th scope="row">2</th>
            <td>Emilio</td>
            <td>Sánchez</td>
            <td>200</td>
        </tr>
        </tbody> <!-- Fin de la tabla-->
    </table> <!-- Fin div de la tabla-->
</div>

<script crossorigin="anonymous"
        integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq"

</html>
